<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Financiere Mainframe</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #33ff33;
            --green-dim: #1a9a1a;
            --green-glow: #00ff0044;
            --amber: #ffaa00;
            --amber-dim: #996600;
            --cyan: #00ddff;
            --red: #ff4444;
            --white: #ccffcc;
            --bg: #0a0a08;
            --surface: #0d0f0a;
            --border: #1a2a1a;
            --font: "IBM Plex Mono", "Courier New", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CRT scanline overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Subtle vignette */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 9998;
        }

        .shell {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px 20px;
            min-height: 100vh;
        }

        /* ---- TOP BAR ---- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--green-dim);
            margin-bottom: 4px;
            font-size: 12px;
        }
        .topbar .title { font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .topbar .status { color: var(--green-dim); }

        /* ---- MENU BAR ---- */
        .menubar {
            display: flex;
            gap: 0;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
            font-size: 13px;
        }
        .menubar button {
            background: none;
            border: none;
            color: var(--green-dim);
            font-family: var(--font);
            font-size: 13px;
            padding: 4px 16px;
            cursor: pointer;
            position: relative;
            transition: color 0.15s;
        }
        .menubar button:hover { color: var(--green); }
        .menubar button.active {
            color: var(--bg);
            background: var(--green);
        }
        .menubar button .key {
            text-decoration: underline;
        }

        /* ---- SCREEN AREA ---- */
        .screen {
            border: 1px solid var(--green-dim);
            background: var(--surface);
            min-height: 520px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.03), inset 0 0 60px rgba(0, 0, 0, 0.3);
        }

        .screen-header {
            background: var(--green);
            color: var(--bg);
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.5px;
        }

        .screen-body {
            padding: 12px 16px;
        }

        /* ---- PROGRAM LIST ---- */
        .pgm-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .pgm-item {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            gap: 12px;
            align-items: baseline;
            transition: background 0.1s;
        }
        .pgm-item:hover {
            background: rgba(51, 255, 51, 0.05);
        }
        .pgm-item.selected {
            background: rgba(51, 255, 51, 0.1);
            border-color: var(--green-dim);
        }
        .pgm-item .pgm-id {
            color: var(--cyan);
            font-weight: 600;
            min-width: 80px;
            font-size: 13px;
        }
        .pgm-item .pgm-name {
            color: var(--green);
            font-size: 13px;
        }
        .pgm-item .pgm-input-hint {
            color: var(--amber-dim);
            font-size: 11px;
            margin-left: auto;
        }

        /* ---- COMMAND LINE ---- */
        .cmdline {
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
        }
        .cmdline .prompt-char {
            color: var(--green);
            font-weight: 600;
            font-size: 15px;
        }
        .cmdline input {
            flex: 1;
            background: none;
            border: none;
            color: var(--green);
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            caret-color: var(--green);
        }
        .cmdline input::placeholder { color: var(--green-dim); }
        .cmdline .run-btn {
            background: var(--green);
            color: var(--bg);
            border: none;
            padding: 4px 16px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .cmdline .run-btn:hover { background: var(--white); }
        .cmdline .run-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ---- OUTPUT TERMINAL ---- */
        .terminal {
            padding: 12px 16px;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 460px;
            overflow-y: auto;
            line-height: 1.5;
            color: var(--green);
        }
        .terminal::-webkit-scrollbar { width: 6px; }
        .terminal::-webkit-scrollbar-track { background: var(--bg); }
        .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); }

        .terminal .t-prompt { color: var(--cyan); }
        .terminal .t-info { color: var(--green-dim); }
        .terminal .t-error { color: var(--red); }
        .terminal .t-amber { color: var(--amber); }
        .terminal .t-white { color: var(--white); }
        .terminal .t-head { color: var(--cyan); font-weight: 600; }
        .terminal .t-dim { color: var(--green-dim); }
        .terminal .t-separator { color: var(--green-dim); }

        /* ---- DATA VIEWER ---- */
        .data-bar {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            flex-wrap: wrap;
        }
        .data-chip {
            background: none;
            border: 1px solid var(--green-dim);
            color: var(--green);
            font-family: var(--font);
            font-size: 11px;
            padding: 3px 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .data-chip:hover {
            background: var(--green);
            color: var(--bg);
        }

        /* ---- INFO PANELS (DB2/CICS) ---- */
        .info-block {
            padding: 8px 0;
        }
        .info-block h3 {
            color: var(--cyan);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .info-table td {
            padding: 3px 8px;
            border-bottom: 1px solid var(--border);
        }
        .info-table td:first-child {
            color: var(--cyan);
            font-weight: 500;
            width: 100px;
        }
        .info-table td:nth-child(2) {
            color: var(--amber);
            width: 160px;
        }
        .info-table td:last-child {
            color: var(--green-dim);
        }

        /* ---- FOOTER ---- */
        .footer-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            margin-top: 8px;
            font-size: 11px;
            color: var(--green-dim);
            border-top: 1px solid var(--border);
        }
        .footer-bar a {
            color: var(--green-dim);
            text-decoration: none;
        }
        .footer-bar a:hover { color: var(--green); }

        /* ---- FUNCTION KEYS ---- */
        .fkeys {
            display: flex;
            gap: 12px;
            padding: 6px 0;
            font-size: 11px;
            color: var(--green-dim);
            flex-wrap: wrap;
        }
        .fkeys span {
            color: var(--white);
        }

        /* ---- CURSOR BLINK ---- */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink::after {
            content: "\2588";
            animation: blink 1s step-end infinite;
            color: var(--green);
        }

        /* ---- LOADING ---- */
        @keyframes spin {
            0% { content: "|"; }
            25% { content: "/"; }
            50% { content: "-"; }
            75% { content: "\\"; }
        }
        .loading::after {
            content: "|";
            animation: spin 0.4s steps(4) infinite;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="topbar">
            <div class="title">Gestion Financiere Mainframe</div>
            <div class="status" id="clock"></div>
        </div>

        <div class="menubar" id="menubar">
            <button class="active" data-phase="batch"><span class="key">1</span> Batch</button>
            <button data-phase="db2"><span class="key">2</span> DB2</button>
            <button data-phase="cics"><span class="key">3</span> CICS</button>
            <button data-phase="data"><span class="key">4</span> Donnees</button>
        </div>

        <div class="screen">
            <div class="screen-header">
                <span id="screen-title">PROGRAMMES BATCH — COBOL/GnuCOBOL</span>
                <span id="screen-info"></span>
            </div>

            <div class="screen-body" id="screen-body"></div>

            <div class="cmdline" id="cmdline" style="display:none">
                <span class="prompt-char">></span>
                <input type="text" id="cmd-input" placeholder="Selectionner un programme..." autocomplete="off">
                <button class="run-btn" id="run-btn" onclick="execProgram()" disabled>EXEC</button>
            </div>
        </div>

        <div class="fkeys">
            <span>F1</span>=Aide
            <span>F3</span>=Quitter
            <span>F5</span>=Executer
            <span>F7</span>=Haut
            <span>F8</span>=Bas
            <span>Enter</span>=Valider
        </div>

        <div class="footer-bar">
            <div>GnuCOBOL 3.2 | Flask API | Docker</div>
            <div>
                <a href="https://josuerocha.dev">josuerocha.dev</a> ·
                <a href="https://github.com/josuerochadev/fil-rouge-mainframe">GitHub</a>
            </div>
        </div>
    </div>

<script>
let programs = [];
let selected = null;
let currentPhase = "batch";

// Clock
function updateClock() {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    document.getElementById("clock").textContent =
        `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
setInterval(updateClock, 1000);
updateClock();

// Load programs
async function init() {
    try {
        const res = await fetch("/api/programs");
        programs = await res.json();
    } catch(e) {
        programs = [];
    }
    showPhase("batch");
}

// Phase tabs
document.getElementById("menubar").addEventListener("click", e => {
    const btn = e.target.closest("button");
    if (!btn) return;
    document.querySelectorAll(".menubar button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    showPhase(btn.dataset.phase);
});

// Keyboard shortcuts
document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") {
        if (e.key === "Enter") execProgram();
        return;
    }
    if (e.key === "1") showPhaseByKey("batch");
    if (e.key === "2") showPhaseByKey("db2");
    if (e.key === "3") showPhaseByKey("cics");
    if (e.key === "4") showPhaseByKey("data");
    if (e.key === "F5" || e.key === "Enter") { e.preventDefault(); execProgram(); }
});

function showPhaseByKey(phase) {
    document.querySelectorAll(".menubar button").forEach(b => {
        b.classList.toggle("active", b.dataset.phase === phase);
    });
    showPhase(phase);
}

function showPhase(phase) {
    currentPhase = phase;
    selected = null;
    const body = document.getElementById("screen-body");
    const cmdline = document.getElementById("cmdline");
    const title = document.getElementById("screen-title");
    const info = document.getElementById("screen-info");

    if (phase === "batch") {
        title.textContent = "PROGRAMMES BATCH — COBOL/GnuCOBOL";
        info.textContent = programs.filter(p => p.phase === "batch").length + " programmes";
        cmdline.style.display = "flex";
        renderBatch(body);
    } else if (phase === "db2") {
        title.textContent = "PROGRAMMES DB2 — SQL EMBARQUE";
        info.textContent = "11 programmes";
        cmdline.style.display = "none";
        renderDB2(body);
    } else if (phase === "cics") {
        title.textContent = "SYSTEME CICS — TRANSACTIONNEL";
        info.textContent = "7 transactions";
        cmdline.style.display = "none";
        renderCICS(body);
    } else if (phase === "data") {
        title.textContent = "DONNEES DE REFERENCE";
        info.textContent = "fichiers .dat";
        cmdline.style.display = "none";
        renderData(body);
    }
}

// ---- BATCH ----
function renderBatch(body) {
    const list = programs.filter(p => p.phase === "batch");
    body.innerHTML = `<div class="pgm-grid">${list.map(p => `
        <div class="pgm-item" data-id="${p.id}" onclick="selectPgm('${p.id}')">
            <span class="pgm-id">${p.id}</span>
            <span class="pgm-name">${p.name}</span>
            ${p.input ? '<span class="pgm-input-hint">SYSIN</span>' : ''}
        </div>`).join("")}</div>`;

    document.getElementById("cmd-input").placeholder = "Selectionner un programme...";
    document.getElementById("cmd-input").value = "";
    document.getElementById("run-btn").disabled = true;
}

function selectPgm(id) {
    const pgm = programs.find(p => p.id === id);
    if (!pgm) return;
    selected = pgm;

    document.querySelectorAll(".pgm-item").forEach(el => {
        el.classList.toggle("selected", el.dataset.id === id);
    });

    const input = document.getElementById("cmd-input");
    const btn = document.getElementById("run-btn");

    if (pgm.input) {
        input.placeholder = pgm.input;
        input.value = "";
        input.focus();
    } else {
        input.placeholder = `${pgm.id} — Appuyer sur EXEC ou Enter`;
        input.value = "";
    }
    btn.disabled = false;
}

async function execProgram() {
    if (!selected || currentPhase !== "batch") return;

    const input = document.getElementById("cmd-input").value;
    if (selected.input && !input.trim()) {
        document.getElementById("cmd-input").focus();
        return;
    }

    const body = document.getElementById("screen-body");
    body.innerHTML = `<div class="terminal"><span class="t-prompt">EXEC ${selected.id}</span>${input ? ` INPUT='${input}'` : ''}\n<span class="t-info loading">Traitement en cours </span></div>`;

    try {
        const res = await fetch(`/api/run/${selected.id}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ input }),
        });
        const data = await res.json();

        if (data.error) {
            body.innerHTML = `<div class="terminal"><span class="t-prompt">EXEC ${selected.id}</span>\n<span class="t-error">ERREUR: ${esc(data.error)}</span></div>`;
            return;
        }

        let out = `<span class="t-prompt">EXEC ${selected.id}</span>  ${esc(selected.name)}\n`;
        out += `<span class="t-separator">${"─".repeat(70)}</span>\n`;

        // Show edition output (file output) if available - this is the main output
        if (data.edition && data.edition.trim()) {
            out += `<span class="t-white">${esc(data.edition)}</span>`;
        }
        // Show stdout if there's meaningful content beyond just program start/end messages
        if (data.stdout && data.stdout.trim()) {
            // If we already showed edition, put stdout in a dimmer style
            if (data.edition && data.edition.trim()) {
                out += `\n<span class="t-separator">${"─".repeat(70)}</span>\n`;
                out += `<span class="t-dim">${esc(data.stdout)}</span>`;
            } else {
                out += `<span class="t-white">${esc(data.stdout)}</span>`;
            }
        }

        if (data.stderr && data.stderr.trim()) {
            out += `\n<span class="t-error">${esc(data.stderr)}</span>`;
        }

        out += `\n<span class="t-separator">${"─".repeat(70)}</span>\n`;
        out += `<span class="t-info">RC=${data.returncode}  ${selected.id} TERMINE</span>`;

        body.innerHTML = `<div class="terminal">${out}</div>`;
    } catch(e) {
        body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR CONNEXION API</span></div>`;
    }
}

// ---- DB2 ----
function renderDB2(body) {
    const pgms = [
        ["AFFREG",  "SELECT INTO",    "Affichage region par code"],
        ["AFFCLI",  "CURSOR/FETCH",   "Clients d'une region (Marseille)"],
        ["INSCLI",  "INSERT/COMMIT",  "Insertion nouveau client"],
        ["MAJCLI",  "UPDATE/ROLLBACK","Mise a jour client"],
        ["STATCLI", "SUM/AVG/COUNT",  "Statistiques debiteurs/crediteurs"],
        ["TOTREG",  "JOIN/CASE",      "Totaux par region"],
        ["TOTMVT",  "SUM/COUNT",      "Total mouvements d'un client"],
        ["MVT2024", "CURSOR/JOIN",    "Mouvements de l'annee 2024"],
        ["RLV012",  "CURSOR/SYSIN",   "Mouvements 2024 d'un client"],
        ["RELEVE",  "CURSOR/FETCH",   "Releve de compte avec mouvements"],
        ["LSTRUPT", "JOIN/RUPTURE",   "Liste clients avec ruptures 3 niveaux"],
    ];

    body.innerHTML = `
        <div class="terminal" style="max-height:none">
<span class="t-head">  PROGRAMMES COBOL-DB2 — SQL EMBARQUE DANS COBOL</span>
<span class="t-separator">${"─".repeat(70)}</span>
<span class="t-dim">  Ces programmes utilisent le precompilateur DB2 (DSNHPC) et ne sont
  pas compilables avec GnuCOBOL. Developpes et testes sur z/OS.</span>

<span class="t-separator">${"─".repeat(70)}</span>
<span class="t-head">  PROGRAMME   TECHNIQUE          DESCRIPTION</span>
<span class="t-separator">${"─".repeat(70)}</span>
${pgms.map(([id, tech, desc]) =>
`  <span class="t-prompt">${id.padEnd(12)}</span><span class="t-amber">${tech.padEnd(19)}</span>${desc}`
).join("\n")}
<span class="t-separator">${"─".repeat(70)}</span>

<span class="t-dim">  Schema : 5 tables (CLIENT, REGION, PROFESSI, NATCOMPT, MOUVEMENT)
  Gestion transactionnelle : COMMIT / ROLLBACK sur chaque modification
  Rapport complet : 02-db2/doc/RAPPORT-PROJET.md</span>
        </div>`;
}

// ---- CICS ----
function renderCICS(body) {
    const txns = [
        ["AFFI", "PRGCLIA", "Affichage d'un client par numero"],
        ["AJOU", "PRGAJT",  "Ajout client avec validation complete"],
        ["MAJU", "PRGMAJ",  "Modification client (adresse, solde)"],
        ["SUPP", "PRGSUP",  "Suppression avec confirmation"],
        ["DELG", "PRGDEL",  "Consultation avec delegation inter-pgm"],
        ["LIST", "PRGLGEN", "Liste paginee (STARTBR/READNEXT)"],
        ["STAT", "PRGSTAT", "Statistiques par region (AIX/PATH)"],
    ];

    body.innerHTML = `
        <div class="terminal" style="max-height:none">
<span class="t-head">  SYSTEME TRANSACTIONNEL CICS — 7 TRANSACTIONS</span>
<span class="t-separator">${"─".repeat(70)}</span>
<span class="t-dim">  Systeme CRUD interactif sous CICS TS avec ecrans BMS,
  mode pseudo-conversationnel et COMMAREA.</span>

<span class="t-separator">${"─".repeat(70)}</span>
<span class="t-head">  TRANS  PROGRAMME  DESCRIPTION</span>
<span class="t-separator">${"─".repeat(70)}</span>
${txns.map(([tx, pgm, desc]) =>
`  <span class="t-amber">${tx.padEnd(7)}</span><span class="t-prompt">${pgm.padEnd(11)}</span>${desc}`
).join("\n")}
<span class="t-separator">${"─".repeat(70)}</span>

<span class="t-head">  OPTIMISATIONS IMPLEMENTEES</span>
<span class="t-separator">${"─".repeat(70)}</span>
  <span class="t-amber">FSET      </span> Renvoi automatique des champs modifies dans BMS
  <span class="t-amber">DATAONLY  </span> Reaffichage sans renvoyer la structure MAP
  <span class="t-amber">CURSOR    </span> Positionnement dynamique sur le champ en erreur
<span class="t-separator">${"─".repeat(70)}</span>

<span class="t-head">  ARCHITECTURE</span>
<span class="t-separator">${"─".repeat(70)}</span>
  <span class="t-prompt">Mode       </span> Pseudo-conversationnel (RETURN TRANSID)
  <span class="t-prompt">Ecrans     </span> 7 maps BMS avec DFHMSD/DFHMDI/DFHMDF
  <span class="t-prompt">Donnees    </span> VSAM KSDS + index alternatifs (AIX/PATH)
  <span class="t-prompt">Navigation </span> STARTBR / READNEXT / READPREV / ENDBR
  <span class="t-prompt">Pagination </span> REDEFINES pour acces indexe aux lignes BMS
<span class="t-separator">${"─".repeat(70)}</span>

<span class="t-dim">  Rapport complet avec 160+ captures : 03-cics/doc/rapport-complet.md</span>
        </div>`;
}

// ---- DATA ----
function renderData(body) {
    const files = [
        ["CLIENT.dat",    "20 clients",       "Num, region, nom, prenom, solde, position"],
        ["COMPTE.dat",    "5 natures",        "Code nature, libelle"],
        ["PROFES.dat",    "10 professions",   "Code profession, libelle"],
        ["REGION.dat",    "4 regions",        "Code region, libelle"],
        ["MOUVEMENT.dat", "15 mouvements",    "Num compte, libelle, montant, sens, date"],
    ];

    body.innerHTML = `
        <div class="terminal" style="max-height:none">
<span class="t-head">  FICHIERS DE DONNEES — FORMAT ENREGISTREMENT FIXE (80 OCT)</span>
<span class="t-separator">${"─".repeat(70)}</span>
<span class="t-head">  FICHIER           CONTENU          STRUCTURE</span>
<span class="t-separator">${"─".repeat(70)}</span>
${files.map(([f, cnt, desc]) =>
`  <span class="t-prompt">${f.padEnd(18)}</span><span class="t-amber">${cnt.padEnd(17)}</span><span class="t-dim">${desc}</span>`
).join("\n")}
<span class="t-separator">${"─".repeat(70)}</span>

<span class="t-info">  Cliquer sur un fichier pour afficher son contenu :</span>
</div>
<div class="data-bar">
${files.map(([f]) => `<button class="data-chip" onclick="viewData('${f}')">${f}</button>`).join("")}
</div>
<div id="data-output"></div>`;
}

async function viewData(filename) {
    const out = document.getElementById("data-output");
    if (!out) return;
    out.innerHTML = `<div class="terminal"><span class="t-info loading">Lecture ${filename} </span></div>`;

    try {
        const res = await fetch(`/api/data/${filename}`);
        const data = await res.json();
        if (data.error) {
            out.innerHTML = `<div class="terminal"><span class="t-error">${esc(data.error)}</span></div>`;
            return;
        }
        let content = `<span class="t-head">  ${filename}  (${data.count} enregistrements)</span>\n`;
        content += `<span class="t-separator">${"─".repeat(70)}</span>\n`;
        content += `<span class="t-white">${esc(data.lines.join(""))}</span>`;
        out.innerHTML = `<div class="terminal">${content}</div>`;
    } catch(e) {
        out.innerHTML = `<div class="terminal"><span class="t-error">ERREUR LECTURE</span></div>`;
    }
}

function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

init();
</script>
</body>
</html>
