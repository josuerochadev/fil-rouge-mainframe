<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Financiere Mainframe</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #33ff33;
            --green-dim: #1a9a1a;
            --green-glow: #00ff0044;
            --amber: #ffaa00;
            --amber-dim: #996600;
            --cyan: #00ddff;
            --red: #ff4444;
            --white: #ccffcc;
            --bg: #0a0a08;
            --surface: #0d0f0a;
            --border: #1a2a1a;
            --font: "IBM Plex Mono", "Courier New", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CRT scanline overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Subtle vignette */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 9998;
        }

        .shell {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px 20px;
            min-height: 100vh;
        }

        /* ---- TOP BAR ---- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--green-dim);
            margin-bottom: 4px;
            font-size: 12px;
        }
        .topbar .title { font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .topbar .status { color: var(--green-dim); }

        /* ---- MENU BAR ---- */
        .menubar {
            display: flex;
            gap: 0;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
            font-size: 13px;
        }
        .menubar button {
            background: none;
            border: none;
            color: var(--green-dim);
            font-family: var(--font);
            font-size: 13px;
            padding: 4px 16px;
            cursor: pointer;
            position: relative;
            transition: color 0.15s;
        }
        .menubar button:hover { color: var(--green); }
        .menubar button.active {
            color: var(--bg);
            background: var(--green);
        }
        .menubar button .key {
            text-decoration: underline;
        }

        /* ---- SCREEN AREA ---- */
        .screen {
            border: 1px solid var(--green-dim);
            background: var(--surface);
            min-height: 520px;
            max-height: 80vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.03), inset 0 0 60px rgba(0, 0, 0, 0.3);
        }

        .screen-header {
            background: var(--green);
            color: var(--bg);
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.5px;
        }

        .screen-body {
            padding: 12px 16px;
            flex: 1;
            overflow-y: auto;
        }
        .screen-body::-webkit-scrollbar { width: 6px; }
        .screen-body::-webkit-scrollbar-track { background: var(--bg); }
        .screen-body::-webkit-scrollbar-thumb { background: var(--green-dim); }

        /* ---- PROGRAM LIST ---- */
        .pgm-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .pgm-item {
            padding: 8px 12px;
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            gap: 12px;
            align-items: baseline;
            transition: background 0.1s;
        }
        .pgm-item:hover {
            background: rgba(51, 255, 51, 0.05);
        }
        .pgm-item.selected {
            background: rgba(51, 255, 51, 0.1);
            border-color: var(--green-dim);
        }
        .pgm-item .pgm-id {
            color: var(--cyan);
            font-weight: 600;
            min-width: 80px;
            font-size: 13px;
        }
        .pgm-item .pgm-name {
            color: var(--green);
            font-size: 13px;
        }
        .pgm-item .pgm-input-hint {
            color: var(--amber-dim);
            font-size: 11px;
            margin-left: auto;
        }

        /* ---- INFO BANNER ---- */
        .info-banner {
            padding: 8px 16px;
            min-height: 52px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        /* ---- BACK BUTTON ---- */
        .back-btn {
            background: none;
            border: 1px solid var(--green-dim);
            color: var(--green);
            font-family: var(--font);
            font-size: 11px;
            padding: 2px 10px;
            cursor: pointer;
            margin-right: 8px;
            transition: all 0.15s;
        }
        .back-btn:hover {
            background: var(--green);
            color: var(--bg);
        }

        /* ---- COMMAND LINE ---- */
        .cmdline {
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
        }
        .cmdline .prompt-char {
            color: var(--green);
            font-weight: 600;
            font-size: 15px;
        }
        .cmdline input {
            flex: 1;
            background: none;
            border: none;
            color: var(--green);
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            caret-color: var(--green);
        }
        .cmdline input::placeholder { color: var(--green-dim); }
        .cmdline .run-btn {
            background: var(--green);
            color: var(--bg);
            border: none;
            padding: 4px 16px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .cmdline .run-btn:hover { background: var(--white); }
        .cmdline .run-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ---- OUTPUT TERMINAL ---- */
        .terminal {
            padding: 12px 16px;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 460px;
            overflow-y: auto;
            line-height: 1.5;
            color: var(--green);
        }
        .terminal::-webkit-scrollbar { width: 6px; }
        .terminal::-webkit-scrollbar-track { background: var(--bg); }
        .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); }

        .terminal .t-prompt { color: var(--cyan); }
        .terminal .t-info { color: var(--green-dim); }
        .terminal .t-error { color: var(--red); }
        .terminal .t-amber { color: var(--amber); }
        .terminal .t-white { color: var(--white); }
        .terminal .t-head { color: var(--cyan); font-weight: 600; }
        .terminal .t-dim { color: var(--green-dim); }
        .terminal .t-separator { color: var(--green-dim); }

        /* ---- DATA VIEWER ---- */
        .data-bar {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            flex-wrap: wrap;
        }
        .data-chip {
            background: none;
            border: 1px solid var(--green-dim);
            color: var(--green);
            font-family: var(--font);
            font-size: 11px;
            padding: 3px 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .data-chip:hover {
            background: var(--green);
            color: var(--bg);
        }

        /* ---- INFO PANELS (DB2/CICS) ---- */
        .info-block {
            padding: 8px 0;
        }
        .info-block h3 {
            color: var(--cyan);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .info-table td {
            padding: 3px 8px;
            border-bottom: 1px solid var(--border);
        }
        .info-table td:first-child {
            color: var(--cyan);
            font-weight: 500;
            width: 100px;
        }
        .info-table td:nth-child(2) {
            color: var(--amber);
            width: 160px;
        }
        .info-table td:last-child {
            color: var(--green-dim);
        }

        /* ---- FOOTER ---- */
        .footer-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            margin-top: 8px;
            font-size: 11px;
            color: var(--green-dim);
            border-top: 1px solid var(--border);
        }
        .footer-bar a {
            color: var(--green-dim);
            text-decoration: none;
        }
        .footer-bar a:hover { color: var(--green); }

        /* ---- FUNCTION KEYS ---- */
        .fkeys {
            display: flex;
            gap: 12px;
            padding: 6px 0;
            font-size: 11px;
            color: var(--green-dim);
            flex-wrap: wrap;
        }
        .fkeys span {
            color: var(--white);
        }

        /* ---- CICS NAV BAR ---- */
        .cics-nav {
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 12px;
        }
        .cics-nav .nav-btn {
            background: none;
            border: 1px solid var(--green-dim);
            color: var(--green);
            font-family: var(--font);
            font-size: 12px;
            padding: 3px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .cics-nav .nav-btn:hover {
            background: var(--green);
            color: var(--bg);
        }
        .cics-nav .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .cics-nav .step-info {
            color: var(--amber);
            font-size: 12px;
        }
        .cics-nav .nav-hint {
            color: var(--green-dim);
            margin-left: auto;
        }

        /* ---- CURSOR BLINK ---- */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink::after {
            content: "\2588";
            animation: blink 1s step-end infinite;
            color: var(--green);
        }

        /* ---- LOADING ---- */
        @keyframes spin {
            0% { content: "|"; }
            25% { content: "/"; }
            50% { content: "-"; }
            75% { content: "\\"; }
        }
        .loading::after {
            content: "|";
            animation: spin 0.4s steps(4) infinite;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="topbar">
            <div style="display:flex;align-items:center">
                <div class="title">Gestion Financiere Mainframe</div>
                <button class="back-btn" id="demo-btn" onclick="runDemo()" style="margin-left:16px">DEMO</button>
            </div>
            <div class="status" id="clock"></div>
        </div>

        <div class="menubar" id="menubar">
            <button class="active" data-phase="batch"><span class="key">1</span> Batch</button>
            <button data-phase="db2"><span class="key">2</span> DB2</button>
            <button data-phase="cics"><span class="key">3</span> CICS</button>
            <button data-phase="data"><span class="key">4</span> Donnees</button>
        </div>

        <div class="screen">
            <div class="screen-header">
                <span id="screen-title">PROGRAMMES BATCH — COBOL/GnuCOBOL</span>
                <span id="screen-info"></span>
            </div>

            <div class="screen-body" id="screen-body"></div>

            <div class="cmdline" id="cmdline" style="display:none">
                <span class="prompt-char">></span>
                <input type="text" id="cmd-input" placeholder="Selectionner un programme..." autocomplete="off">
                <button class="run-btn" id="code-btn" onclick="viewSource()" disabled style="background:var(--amber)">CODE</button>
                <button class="run-btn" id="run-btn" onclick="execProgram()" disabled>EXEC</button>
            </div>

            <div class="cics-nav" id="cics-nav" style="display:none">
                <button class="nav-btn" id="cics-prev-btn" onclick="cicsPrev()" disabled>PF7 Prec</button>
                <button class="nav-btn" id="cics-next-btn" onclick="cicsNext()" disabled>PF8 Suiv</button>
                <span class="step-info" id="cics-step-info"></span>
                <span class="nav-hint" id="cics-nav-hint">Selectionner une transaction</span>
            </div>
        </div>

        <div class="fkeys">
            <span>F1</span>=Aide
            <span>F3</span>=Quitter
            <span>F5</span>=Executer
            <span>F7</span>=Haut
            <span>F8</span>=Bas
            <span>Enter</span>=Valider
        </div>

        <div class="footer-bar">
            <div>32 programmes COBOL · 60 JCL · 14 SQL · 7 BMS — GnuCOBOL · Flask · Docker</div>
            <div>
                <a href="https://josuerocha.dev">josuerocha.dev</a> ·
                <a href="https://github.com/josuerochadev/fil-rouge-mainframe">GitHub</a>
            </div>
        </div>
    </div>

<script>
let programs = [];
let selected = null;
let currentPhase = "batch";

// DB2 state
let db2Queries = [];
let selectedQuery = null;

// CICS state
let cicsScreens = [];
let selectedScreen = null;
let currentStep = 0;

// Category map for batch programs
const categories = {
    "EDITION": ["PJ10ACT", "PJ10REG", "PJ14MAIN"],
    "CALCUL": ["PJ15MONT", "PJ16COND", "PJ17TOP5"],
    "MOUVEMENTS": ["PJ19MOMT", "PJ20RLV", "PJ21MERG"],
    "MISE A JOUR": ["PJ13AJOU"],
};

// Clock
function updateClock() {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    document.getElementById("clock").textContent =
        `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
setInterval(updateClock, 1000);
updateClock();

// Load programs
async function init() {
    try {
        const res = await fetch("/api/programs");
        programs = await res.json();
    } catch(e) {
        programs = [];
    }
    showPhase("batch");
}

// Phase tabs
document.getElementById("menubar").addEventListener("click", e => {
    const btn = e.target.closest("button");
    if (!btn) return;
    document.querySelectorAll(".menubar button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    showPhase(btn.dataset.phase);
});

// Keyboard shortcuts
document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") {
        if (e.key === "Enter") execProgram();
        return;
    }
    if (e.key === "1") showPhaseByKey("batch");
    if (e.key === "2") showPhaseByKey("db2");
    if (e.key === "3") showPhaseByKey("cics");
    if (e.key === "4") showPhaseByKey("data");
    if (e.key === "F5" || e.key === "Enter") { e.preventDefault(); execProgram(); }
    if (e.key === "F7") { e.preventDefault(); if (currentPhase === "cics") cicsPrev(); }
    if (e.key === "F8") { e.preventDefault(); if (currentPhase === "cics") cicsNext(); }
});

function showPhaseByKey(phase) {
    document.querySelectorAll(".menubar button").forEach(b => {
        b.classList.toggle("active", b.dataset.phase === phase);
    });
    showPhase(phase);
}

function showPhase(phase) {
    currentPhase = phase;
    selected = null;
    selectedQuery = null;
    selectedScreen = null;
    currentStep = 0;

    const body = document.getElementById("screen-body");
    const cmdline = document.getElementById("cmdline");
    const cicsNav = document.getElementById("cics-nav");
    const title = document.getElementById("screen-title");
    const info = document.getElementById("screen-info");

    cmdline.style.display = "none";
    cicsNav.style.display = "none";

    if (phase === "batch") {
        title.textContent = "PROGRAMMES BATCH — COBOL/GnuCOBOL";
        info.textContent = programs.filter(p => p.phase === "batch").length + " programmes";
        cmdline.style.display = "flex";
        renderBatch(body);
    } else if (phase === "db2") {
        title.textContent = "PROGRAMMES DB2 — SQL EMBARQUE";
        info.textContent = "7 requetes";
        cmdline.style.display = "flex";
        renderDB2(body);
    } else if (phase === "cics") {
        title.textContent = "SYSTEME CICS — TRANSACTIONNEL";
        info.textContent = "5 transactions";
        cicsNav.style.display = "flex";
        renderCICS(body);
    } else if (phase === "data") {
        title.textContent = "DONNEES DE REFERENCE";
        info.textContent = "fichiers .dat";
        renderData(body);
    }
}

// ---- BATCH ----
function renderBatch(body) {
    const list = programs.filter(p => p.phase === "batch");

    // Build categorized grid
    let gridHtml = "";
    const allCategorized = [];
    Object.keys(categories).forEach(cat => { allCategorized.push(...categories[cat]); });

    for (const [catName, catIds] of Object.entries(categories)) {
        const catPrograms = catIds.map(id => list.find(p => p.id === id)).filter(Boolean);
        if (catPrograms.length === 0) continue;

        gridHtml += `<div style="padding:4px 12px;color:var(--amber);font-size:11px;border-bottom:1px solid var(--border)">${catName}</div>`;
        gridHtml += `<div class="pgm-grid">`;
        catPrograms.forEach(p => {
            gridHtml += `
            <div class="pgm-item" data-id="${p.id}" onclick="selectPgm('${p.id}')">
                <span class="pgm-id">${p.id}</span>
                <div style="flex:1;min-width:0">
                    <span class="pgm-name">${p.name}</span>
                    <span style="color:var(--green-dim);font-size:11px;display:block;margin-top:2px">${esc(p.description || "")}</span>
                </div>
                ${p.input ? '<span class="pgm-input-hint">SYSIN</span>' : ''}
            </div>`;
        });
        gridHtml += `</div>`;
    }

    // Uncategorized programs
    const uncategorized = list.filter(p => !allCategorized.includes(p.id));
    if (uncategorized.length > 0) {
        gridHtml += `<div style="padding:4px 12px;color:var(--amber);font-size:11px;border-bottom:1px solid var(--border)">AUTRES</div>`;
        gridHtml += `<div class="pgm-grid">`;
        uncategorized.forEach(p => {
            gridHtml += `
            <div class="pgm-item" data-id="${p.id}" onclick="selectPgm('${p.id}')">
                <span class="pgm-id">${p.id}</span>
                <div style="flex:1;min-width:0">
                    <span class="pgm-name">${p.name}</span>
                    <span style="color:var(--green-dim);font-size:11px;display:block;margin-top:2px">${esc(p.description || "")}</span>
                </div>
                ${p.input ? '<span class="pgm-input-hint">SYSIN</span>' : ''}
            </div>`;
        });
        gridHtml += `</div>`;
    }

    body.innerHTML = `
        <div class="info-banner" id="batch-info">
<span class="t-dim">  Programmes COBOL compiles avec GnuCOBOL. Fichiers VSAM, tris,</span>
<span class="t-dim">  fusions et editions de rapports financiers. Selectionner puis EXEC.</span>
        </div>
        <div id="batch-grid">${gridHtml}</div>`;

    document.getElementById("cmd-input").placeholder = "Selectionner un programme...";
    document.getElementById("cmd-input").value = "";
    document.getElementById("run-btn").disabled = true;
    document.getElementById("code-btn").disabled = true;
}

function selectPgm(id) {
    const pgm = programs.find(p => p.id === id);
    if (!pgm) return;
    selected = pgm;

    document.querySelectorAll(".pgm-item").forEach(el => {
        el.classList.toggle("selected", el.dataset.id === id);
    });

    const banner = document.getElementById("batch-info");
    if (banner) {
        banner.innerHTML = `<span class="t-head">  ${esc(pgm.id)} — ${esc(pgm.name)}</span>\n<span class="t-dim">  ${esc(pgm.description)}</span>\n<span class="t-info">  ${pgm.input ? "Saisir " + esc(pgm.input) + " puis EXEC" : "Appuyer sur EXEC ou Enter"}</span>`;
    }

    const input = document.getElementById("cmd-input");
    const btn = document.getElementById("run-btn");
    const codeBtn = document.getElementById("code-btn");

    if (pgm.input) {
        input.placeholder = pgm.input;
        input.value = "";
        input.focus();
    } else {
        input.placeholder = `${pgm.id} — Appuyer sur EXEC ou Enter`;
        input.value = "";
    }
    btn.disabled = false;
    codeBtn.disabled = false;
}

// ---- VIEW SOURCE ----
async function viewSource() {
    if (currentPhase === "db2") {
        if (!selectedQuery) return;
        const body = document.getElementById("screen-body");
        body.innerHTML = `<div class="terminal"><span class="t-prompt">SOURCE ${esc(selectedQuery.program)}</span>\n<span class="t-info loading">Chargement source </span></div>`;

        try {
            const res = await fetch(`/api/source/${selectedQuery.program}`);
            const data = await res.json();

            if (data.error) {
                body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR: ${esc(data.error)}</span></div>`;
                return;
            }

            const source = data.source || data.content || "";
            const lines = source.split("\n");

            const cobolKeywords = /\b(IDENTIFICATION|ENVIRONMENT|DATA|PROCEDURE|DIVISION|SECTION|PERFORM|IF|EVALUATE|MOVE|OPEN|CLOSE|READ|WRITE|SORT|MERGE|CALL|STOP|DISPLAY|ACCEPT|EXEC|SQL|END-EXEC)\b/g;

            let out = `<button class="back-btn" onclick="showPhase('db2')">F3 Retour</button>`;
            out += `<span class="t-prompt">SOURCE ${esc(selectedQuery.program)}</span>  ${esc(selectedQuery.name)}\n`;
            out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;

            lines.forEach(line => {
                if (line.length >= 7 && line[6] === "*") {
                    out += `<span class="t-dim">${esc(line)}</span>\n`;
                } else {
                    const escaped = esc(line);
                    const highlighted = escaped.replace(cobolKeywords, '<span class="t-prompt">$1</span>');
                    out += `<span class="t-white">${highlighted}</span>\n`;
                }
            });

            out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;
            out += `<span class="t-info">${lines.length} lignes</span>`;

            body.innerHTML = `<div class="terminal">${out}</div>`;
        } catch(e) {
            body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR CONNEXION API</span></div>`;
        }
        return;
    }

    if (!selected || currentPhase !== "batch") return;

    const body = document.getElementById("screen-body");
    body.innerHTML = `<div class="terminal"><span class="t-prompt">SOURCE ${selected.id}</span>\n<span class="t-info loading">Chargement source </span></div>`;

    try {
        const res = await fetch(`/api/source/${selected.id}`);
        const data = await res.json();

        if (data.error) {
            body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR: ${esc(data.error)}</span></div>`;
            return;
        }

        const source = data.source || data.content || "";
        const lines = source.split("\n");

        const cobolKeywords = /\b(IDENTIFICATION|ENVIRONMENT|DATA|PROCEDURE|DIVISION|SECTION|PERFORM|IF|EVALUATE|MOVE|OPEN|CLOSE|READ|WRITE|SORT|MERGE|CALL|STOP|DISPLAY|ACCEPT)\b/g;

        let out = `<button class="back-btn" onclick="showPhase('batch')">F3 Retour</button>`;
        out += `<span class="t-prompt">SOURCE ${esc(selected.id)}</span>  ${esc(selected.name)}\n`;
        out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;

        lines.forEach(line => {
            // Check if column 7 is * (comment line) — COBOL fixed format
            if (line.length >= 7 && line[6] === "*") {
                out += `<span class="t-dim">${esc(line)}</span>\n`;
            } else {
                // Highlight COBOL keywords
                const escaped = esc(line);
                const highlighted = escaped.replace(cobolKeywords, '<span class="t-prompt">$1</span>');
                out += `<span class="t-white">${highlighted}</span>\n`;
            }
        });

        out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;
        out += `<span class="t-info">${lines.length} lignes</span>`;

        body.innerHTML = `<div class="terminal">${out}</div>`;
    } catch(e) {
        body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR CONNEXION API</span></div>`;
    }
}

async function execProgram() {
    if (currentPhase === "db2") {
        execQuery();
        return;
    }
    if (!selected || currentPhase !== "batch") return;

    const input = document.getElementById("cmd-input").value;
    if (selected.input && !input.trim()) {
        document.getElementById("cmd-input").focus();
        return;
    }

    const body = document.getElementById("screen-body");
    body.innerHTML = `<div class="terminal"><span class="t-prompt">EXEC ${selected.id}</span>${input ? ` INPUT='${input}'` : ''}\n<span class="t-info loading">Traitement en cours </span></div>`;

    try {
        const res = await fetch(`/api/run/${selected.id}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ input }),
        });
        const data = await res.json();

        if (data.error) {
            body.innerHTML = `<div class="terminal"><span class="t-prompt">EXEC ${selected.id}</span>\n<span class="t-error">ERREUR: ${esc(data.error)}</span></div>`;

async function execQuery() {

        document.getElementById("cmd-input").focus();
        return;
    }

    const body = document.getElementById("screen-body");
    body.innerHTML = `<div class="terminal"><span class="t-prompt">SQL ${selectedQuery.id}</span>${inputVal ? ` INPUT='${inputVal}'` : ''}\n<span class="t-info loading">Execution en cours </span></div>`;

    try {
        const res = await fetch(`/api/db2/run/${selectedQuery.id}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ input: inputVal }),
        });
        const data = await res.json();

        if (data.error) {
            body.innerHTML = `<div class="terminal"><span class="t-prompt">SQL ${selectedQuery.id}</span>\n<span class="t-error">ERREUR: ${esc(data.error)}</span></div>`;
            return;
        }

        let out = `<button class="back-btn" onclick="showPhase('db2')">F3 Retour</button>`;
        out += `<span class="t-prompt">SQL ${esc(selectedQuery.id)}</span>`;
        if (selectedQuery.name) {
            out += `  ${esc(selectedQuery.name)}`;
        }
        out += "\n";

        // Show the SQL query if returned
        if (data.sql) {
            out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;
            out += `<span class="t-prompt">${esc(data.sql)}</span>\n`;
        }

        out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;

        // Render columns and rows
        if (data.columns && data.rows) {
            const cols = data.columns;
            // Compute column widths: max of header length and max data length
            const widths = cols.map(c => {
                let max = String(c).length;
                data.rows.forEach(row => {
                    const val = row[c] != null ? String(row[c]) : "";
                    if (val.length > max) max = val.length;
                });
                return Math.min(max + 2, 30);
            });

            // Header
            const header = cols.map((c, i) => String(c).padEnd(widths[i])).join(" ");
            out += `<span class="t-head">${esc(header)}</span>\n`;
            // Header underline
            const underline = widths.map(w => "\u2500".repeat(w)).join(" ");
            out += `<span class="t-separator">${esc(underline)}</span>\n`;

            // Rows with rupture support for LSTRUPT
            if (data.rows.length === 0) {
                out += `<span class="t-dim">  (aucune ligne)</span>\n`;
            } else {
                let prevRegion = null;
                let prevProf = null;
                data.rows.forEach(row => {
                    // Ruptures for LSTRUPT
                    if (data.query_id === "LSTRUPT") {
                        const region = row["NOM_REGION"] || row["CODE_REGION"] || "";
                        const prof = row["LIB_PROF"] || row["CODE_PROF"] || "";
                        if (prevRegion !== null && region !== prevRegion) {
                            out += `\n<span class="t-amber">  ── REGION : ${esc(region)} ──</span>\n\n`;
                        } else if (prevRegion === null) {
                            out += `<span class="t-amber">  ── REGION : ${esc(region)} ──</span>\n\n`;
                        }
                        if (prevProf !== null && prof !== prevProf && region === prevRegion) {
                            out += `<span class="t-dim">     --- ${esc(prof)} ---</span>\n`;
                        } else if (prevRegion === null || region !== prevRegion) {
                            out += `<span class="t-dim">     --- ${esc(prof)} ---</span>\n`;
                        }
                        prevRegion = region;
                        prevProf = prof;
                    }
                    const line = cols.map((c, i) => {
                        const val = row[c] != null ? String(row[c]) : "";
                        return val.padEnd(widths[i]);
                    }).join(" ");
                    out += `<span class="t-white">${esc(line)}</span>\n`;
                });
            }

            out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;
            out += `<span class="t-info">${data.rows.length} ligne(s)  ${esc(selectedQuery.program)} TERMINE</span>`;

            // Demo note for INSCLI/MAJCLI
            if (data.demo_note) {
                out += `\n\n<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;
                out += `<span class="t-head">  SQL EQUIVALENT (z/OS)</span>\n`;
                out += `<span class="t-amber">  ${esc(data.demo_note)}</span>\n`;
                out += `<span class="t-dim">  (demo read-only — sur z/OS, cette requete modifie la base DB2)</span>`;
            }

        } else if (data.message) {
            out += `<span class="t-white">${esc(data.message)}</span>`;
        } else if (data.stdout) {
            out += `<span class="t-white">${esc(data.stdout)}</span>`;
        }

        body.innerHTML = `<div class="terminal">${out}</div>`;
    } catch(e) {
        body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR CONNEXION API</span></div>`;
    }
}

async function showCicsStep(id, step) {
    const body = document.getElementById("screen-body");
    body.innerHTML = `<div class="terminal"><span class="t-info loading">Chargement ecran </span></div>`;

    try {
        const res = await fetch(`/api/cics/screen/${id}?step=${step}`);
        const data = await res.json();

        if (data.error) {
            body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR: ${esc(data.error)}</span></div>`;
            return;
        }

        currentStep = step;

        // Render the 24-line ASCII screen
        const screenLines = Array.isArray(data.screen) ? data.screen : [];
        const screenText = screenLines.join("\n");
        const totalSteps = data.total_steps || 1;

        // Process the screen: highlight input fields
        const rendered = renderCicsScreen(screenText);

        let out = `<span class="t-head">  ${esc(selectedScreen.transaction)}`;
        if (selectedScreen.title) {
            out += ` — ${esc(selectedScreen.title)}`;
        }
        out += `</span>\n`;
        out += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;
        out += rendered;
        out += `\n<span class="t-separator">${"\u2500".repeat(70)}</span>`;

        body.innerHTML = `<div class="terminal" style="font-size:12px">${out}</div>`;

        // Update nav bar
        const prevBtn = document.getElementById("cics-prev-btn");
        const nextBtn = document.getElementById("cics-next-btn");
        const stepInfo = document.getElementById("cics-step-info");
        const navHint = document.getElementById("cics-nav-hint");

        prevBtn.disabled = (step <= 0);
        nextBtn.disabled = (step >= totalSteps - 1);
        stepInfo.textContent = totalSteps > 1 ? `Etape ${step + 1}/${totalSteps}` : "";
        navHint.textContent = `${esc(selectedScreen.transaction)}${selectedScreen.title ? " — " + selectedScreen.title : ""}`;

    } catch(e) {
        body.innerHTML = `<div class="terminal"><span class="t-error">ERREUR CONNEXION API</span></div>`;
    }
}

function renderCicsScreen(text) {
    if (!text) return "";

    // Escape HTML first, then re-apply highlighting
    // We need to escape character by character to avoid double-escaping spans
    // Strategy: split on input field patterns, escape plain parts, wrap fields

    // Replace runs of underscores (input fields) with amber spans
    // Also handle single underscore used as placeholder
    const parts = text.split(/(_{2,}|_(?=[^_]))/g);

    let result = "";
    for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        if (!part) continue;
        if (/^_{2,}$/.test(part) || /^_$/.test(part)) {
            // Input field — amber highlight
            result += `<span class="t-amber">${esc(part)}</span>`;
        } else {
            result += esc(part);
        }
    }
    return result;
}

function cicsPrev() {
    if (!selectedScreen || currentStep <= 0) return;
    showCicsStep(selectedScreen.id, currentStep - 1);
}

function cicsNext() {
    if (!selectedScreen) return;
    showCicsStep(selectedScreen.id, currentStep + 1);
}

        ["PROFES.dat",    "10 professions",   "Code profession, libelle"],
        ["REGION.dat",    "4 regions",        "Code region, libelle"],
        ["MOUVEMENT.dat", "15 mouvements",    "Num compte, libelle, montant, sens, date"],
    ];

    const recordLayout = `<span class="t-head">  STRUCTURE ENREGISTREMENT CLIENT (80 octets)</span>
<span class="t-separator">  ${"─".repeat(44)}</span>
<span class="t-dim">  </span><span class="t-amber">POS 01-03</span><span class="t-dim">  NUM_COMPTE      Numerique(3)   Cle primaire</span>
<span class="t-dim">  </span><span class="t-amber">POS 04-05</span><span class="t-dim">  CODE_REGION     Numerique(2)   01=Grand-Est, 02=IDF, 03=Normandie, 04=Bretagne</span>
<span class="t-dim">  </span><span class="t-amber">POS 06-07</span><span class="t-dim">  NATURE_COMPTE   Numerique(2)   Code nature de compte</span>
<span class="t-dim">  </span><span class="t-amber">POS 08-17</span><span class="t-dim">  NOM             Alpha(10)</span>
<span class="t-dim">  </span><span class="t-amber">POS 18-27</span><span class="t-dim">  PRENOM          Alpha(10)</span>
<span class="t-dim">  </span><span class="t-amber">POS 28-35</span><span class="t-dim">  DATE_NAISSANCE  Numerique(8)   Format AAAAMMJJ</span>
<span class="t-dim">  </span><span class="t-amber">POS 36</span><span class="t-dim">     SEXE            Alpha(1)       M ou F</span>
<span class="t-dim">  </span><span class="t-amber">POS 37-38</span><span class="t-dim">  ACTIVITE_PROF   Numerique(2)   Code profession</span>
<span class="t-dim">  </span><span class="t-amber">POS 39</span><span class="t-dim">     SITUATION       Alpha(1)       C=Celib, M=Marie, D=Divorce, V=Veuf</span>
<span class="t-dim">  </span><span class="t-amber">POS 40-49</span><span class="t-dim">  ADRESSE         Alpha(10)</span>
<span class="t-dim">  </span><span class="t-amber">POS 50-59</span><span class="t-dim">  SOLDE           Numerique(10)</span>
<span class="t-dim">  </span><span class="t-amber">POS 60-61</span><span class="t-dim">  POSITION        Alpha(2)       DB=Debiteur, CR=Crediteur</span>
<span class="t-dim">  </span><span class="t-amber">POS 62-80</span><span class="t-dim">  FILLER          Alpha(19)</span>`;

    body.innerHTML = `
        <div class="terminal" style="max-height:none">
<span class="t-head">  FICHIERS DE DONNEES — FORMAT ENREGISTREMENT FIXE (80 OCT)</span>
<span class="t-separator">${"\u2500".repeat(70)}</span>
<span class="t-head">  FICHIER           CONTENU          STRUCTURE</span>
<span class="t-separator">${"\u2500".repeat(70)}</span>
${files.map(([f, cnt, desc]) =>
`  <span class="t-prompt">${f.padEnd(18)}</span><span class="t-amber">${cnt.padEnd(17)}</span><span class="t-dim">${desc}</span>`
).join("\n")}
<span class="t-separator">${"\u2500".repeat(70)}</span>

${recordLayout}
<span class="t-separator">${"\u2500".repeat(70)}</span>

<span class="t-info">  Cliquer sur un fichier pour afficher son contenu :</span>
</div>
<div class="data-bar">
${files.map(([f]) => `<button class="data-chip" onclick="viewData('${f}')">${f}</button>`).join("")}
</div>
<div id="data-output"></div>`;
}

async function viewData(filename) {
    const out = document.getElementById("data-output");
    if (!out) return;
    out.innerHTML = `<div class="terminal"><span class="t-info loading">Lecture ${filename} </span></div>`;

    try {
        const res = await fetch(`/api/data/${filename}`);
        const data = await res.json();
        if (data.error) {
            out.innerHTML = `<div class="terminal"><span class="t-error">${esc(data.error)}</span></div>`;
            return;
        }
        let content = `<span class="t-head">  ${filename}  (${data.count} enregistrements)</span>\n`;
        content += `<span class="t-separator">${"\u2500".repeat(70)}</span>\n`;
        content += `<span class="t-white">${esc(data.lines.join(""))}</span>`;
        out.innerHTML = `<div class="terminal">${content}</div>`;
    } catch(e) {
        out.innerHTML = `<div class="terminal"><span class="t-error">ERREUR LECTURE</span></div>`;
    }
}

function getLegend(pgmId) {
    const legends = {
        "PJ10ACT": "  Activites : 05=Medecin  10=Ingenieur  15=Comptable  20=Commercant  25=Fonctionnaire  30=Privee",
        "PJ10REG": "  Regions : 01=Grand-Est  02=Ile-de-France  03=Normandie  04=Bretagne",
        "PJ15MONT": "  Montants en centimes (x100). 10 clients debiteurs, 10 clients crediteurs.",
    };
    return legends[pgmId] || null;
}

function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

init();
